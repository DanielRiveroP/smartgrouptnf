<header class="bg-white border-b py-4 shadow-sm relative z-50">
  <div class="nav-container">
    <a href="#" class="flex items-center gap-2">
      <span class="w-3 h-6 bg-indigo-600 rounded-sm"></span>
      <h1 class="logo-text">SmartGroup<span class="text-indigo-600">Tenerife</span></h1>
    </a>

    <div class="flex items-center gap-4 relative">
      <button class="hidden md:block bg-gray-100 text-gray-800 px-5 py-2 rounded-full text-sm font-semibold">
        Panel Propietario
      </button>

      <button id="userMenuButton" data-dropdown-toggle="userDropdown" class="user-btn-black" type="button">
        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path fill-rule="evenodd" d="M12 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm-2 9a4 4 0 0 0-4 4v1a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1a4 4 0 0 0-4-4h-4Z" clip-rule="evenodd"/>
        </svg>
      </button>

      <div id="userDropdown" class="z-10 hidden bg-white divide-y divide-gray-100 rounded-lg shadow-2xl w-44 border border-gray-100 absolute top-full right-0 mt-2">
          <ul class="py-2 text-sm text-gray-700">
            <li><a href="#" class="block px-4 py-2 hover:bg-indigo-50">Iniciar sesión</a></li>
            <li><a href="#" class="block px-4 py-2 hover:bg-indigo-50">Registrarse</a></li>
          </ul>
      </div>
    </div>
  </div>
</header>

<section class="bg-gray-50 py-16 px-4">
  <div class="search-box">
    <div class="search-input-group">
      <span class="search-label">Destino</span>
      <select class="search-field"><option>Santa Cruz</option><option>Adeje</option></select>
    </div>
    <div class="search-input-group">
      <span class="search-label">Entrada</span>
      <input type="date" class="search-field">
    </div>
    <div class="search-input-group">
      <span class="search-label">Salida</span>
      <input type="date" class="search-field">
    </div>
    <div class="search-input-group">
      <span class="search-label">Huéspedes</span>
      <input type="number" class="search-field" placeholder="1">
    </div>
    <button class="btn-primary">Buscar Vivienda</button>
  </div>
</section>

<main class="max-w-7xl mx-auto py-16 px-6">
  <h2 class="text-3xl font-extrabold mb-12">Propiedades Destacadas</h2>
  
  <div class="property-grid">
    <div *ngFor="let casa of viviendas" class="property-card">
      <div class="relative overflow-hidden h-60">
        <img [src]="casa.imagen" class="property-img">
        <span class="absolute bottom-4 left-4 bg-white/90 px-4 py-1.5 rounded-full text-[11px] font-bold uppercase">
          {{ casa.ciudad }}
        </span>
      </div>
      <div class="p-7 flex-grow flex flex-col justify-between">
        <div>
          <h3 class="font-bold text-xl mb-1.5">{{ casa.nombre }}</h3>
          <p class="text-gray-600 text-sm mb-6">{{ casa.habitaciones }} Habitaciones · Gestión Smart</p>
        </div>
        <div class="flex justify-between items-center border-t pt-5">
          <p class="price-tag">{{ casa.precio }}€ <span class="text-xs font-normal text-gray-400">/ noche</span></p>
          <button class="text-sm font-bold hover:text-indigo-600">Ver más</button>
        </div>
      </div>
    </div>
  </div>
</main>
